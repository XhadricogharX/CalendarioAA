<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Aplica el tema antes de pintar (evita parpadeo claro→oscuro)
      (function () {
        try {
          var t = localStorage.getItem('aa_theme')
          if (!t)
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06251B" />
    <meta name="color-scheme" content="light dark" />

    <!-- Instalación como app (iOS / Android) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="AA Calendario" />

    <title>Adelante Andalucía · Calendario</title>
    <meta
      name="description"
      content="Calendario interactivo de manifestaciones, reuniones y actos de Adelante Andalucía. Organízate con tu tierra."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Adelante Andalucía · Calendario" />
    <meta
      property="og:description"
      content="Manifestaciones, reuniones y actos de Adelante Andalucía en un calendario vivo."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Adelante Andalucía · Calendario" />
    <meta
      name="twitter:description"
      content="Manifestaciones, reuniones y actos de Adelante Andalucía en un calendario vivo."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
